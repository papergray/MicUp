name: Build & Release MicUp

on:
  push:
    tags:
      - 'v*'          # trigger on v1.0, v1.2.3, etc.
  workflow_dispatch:  # manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write  # needed to create GitHub Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: |
          echo "y" | sdkmanager "ndk;26.3.11579264" --sdk_root=$ANDROID_SDK_ROOT
          echo "y" | sdkmanager "cmake;3.22.1" --sdk_root=$ANDROID_SDK_ROOT

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Generate Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 8.6 --distribution-type bin
          chmod +x gradlew

      - name: Cache CMake / FetchContent
        uses: actions/cache@v4
        with:
          path: |
            app/.cxx
            ~/.cmake
          key: ${{ runner.os }}-cmake-${{ hashFiles('app/src/main/cpp/CMakeLists.txt') }}
          restore-keys: ${{ runner.os }}-cmake-

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > ${{ github.workspace }}/release.jks

      - name: Build & Sign Release APK
        run: |
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/release.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.STORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/26.3.11579264

      - name: Rename APK
        run: |
          TAG=${GITHUB_REF_NAME:-manual}
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/MicUp-${TAG}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: MicUp ${{ github.ref_name }}
          body: |
            ## MicUp ${{ github.ref_name }}
            
            Signed release APK — install directly on Android.
            
            **What's new:** see commit history.
          files: app/build/outputs/apk/release/MicUp-*.apk
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}

      - name: Upload Build Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: app/build/reports/
          retention-days: 7
